spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/urlshortner}
    username: ${DB_USERNAME:urlshortner}
    password: ${DB_PASSWORD:urlshortner}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
