<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3">Dashboard</h1>
            <p class="text-muted mb-0">Manage your shortened URLs from one place.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/urls/new}">Create URL</a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Total URLs</h5>
                    <p class="card-text display-6" th:text="${analytics.totalUrls}"></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Active URLs</h5>
                    <p class="card-text display-6" th:text="${analytics.activeUrls}"></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Total Clicks</h5>
                    <p class="card-text display-6" th:text="${analytics.totalClicks}"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5">Recent URLs</h2>
            <div th:if="${#lists.isEmpty(urls)}" class="text-muted">No URLs yet. Create your first one.</div>
            <div th:unless="${#lists.isEmpty(urls)}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>Alias</th>
                        <th>Target</th>
                        <th>Created</th>
                        <th>Expires</th>
                        <th>Clicks</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="url : ${urls}">
                        <td>
                            <a th:href="@{/redirect/{alias}(alias=${url.alias})}" target="_blank">
                                <code th:text="${url.alias}"></code>
                            </a>
                        </td>
                        <td><span th:text="${url.targetUrl}"></span></td>
                        <td th:text="${#temporals.format(url.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${url.expiresAt != null ? #temporals.format(url.expiresAt, 'yyyy-MM-dd HH:mm') : 'Never'}"></td>
                        <td th:text="${url.clickCount}"></td>
                        <td>
                            <span class="badge bg-success" th:if="${url.active and (url.expiresAt == null or !url.expiresAt.isBefore(T(java.time.Instant).now()))}">Active</span>
                            <span class="badge bg-warning text-dark" th:if="${url.active and url.expiresAt != null and url.expiresAt.isBefore(T(java.time.Instant).now())}">Expired</span>
                            <span class="badge bg-secondary" th:unless="${url.active}">Inactive</span>
                        </td>
                        <td>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/urls/{id}/edit(id=${url.id})}">Edit</a>
                            <form th:action="@{/urls/{id}/delete(id=${url.id})}" method="post" class="d-inline">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
