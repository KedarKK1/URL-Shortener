<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle ?: 'URL Shortener'}">URL Shortener</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">URL Shortener</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Dashboard</a>
            <a class="nav-link" th:href="@{/urls/new}">Create URL</a>
            <a class="nav-link" th:href="@{/analytics}">Analytics</a>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div layout:fragment="content"></div>
</main>
<footer class="border-top py-3 text-muted">
    <div class="container">Server-rendered with Thymeleaf and Bootstrap.</div>
</footer>
</body>
</html>
